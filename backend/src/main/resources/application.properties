spring.application.name=chatsphere-backend
server.port=${PORT:8080}

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/chatsphere_db}

jwt.secret=${JWT_SECRET:chatsphere_super_secret_key_123456789_chatsphere_super_secret_key}
jwt.expiration=${JWT_EXPIRATION:86400000}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
